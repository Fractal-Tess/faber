name: faber-dev

services:
  faber:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: faber-dev
    ports:
      - '3000:3000'
    volumes:
      # Mount the compiled binary
      - ./target/x86_64-unknown-linux-musl/debug/faber:/opt/faber
      # Mount source code for debugging (optional)
      - ./src:/opt/src:ro
      # Mount logs for easy access
      - ./logs:/var/log/supervisor
    environment:
      RUST_LOG: debug
      API_KEY: open-mode-no-auth
      OPEN: 'true'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
