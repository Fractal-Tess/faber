[api]
host = "0.0.0.0"
port = 3000
max_concurrency = 1

[api.auth]
enable = false
api_key = ""

[api.endpoints]
health_endpoint = "/health"
task_execution_endpoint = "/execute"

[logging]
level = "debug"
dir = "/var/log/faber"
rotation = "hourly"
file_name_prefix = "faber"

[container.filesystem]
base_dir = "/tmp/faber/containers"