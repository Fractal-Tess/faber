[api]
host = "0.0.0.0"
port = 3000
max_concurrency = 1

[api.auth]
enable = false
api_key = ""

[api.endpoints]
health_endpoint = "/health"
task_execution_endpoint = "/execute"

[logging]
level = "debug"
dir = "/var/log/faber"
rotation = "hourly"
file_name_prefix = "faber"

[container.filesystem]
base_dir = "/tmp/faber/containers"
work_dir = "/faber"

[[container.filesystem.mounts]]
source = "/bin"
target = "/bin"
readonly = true

[[container.filesystem.mounts]]
source = "/lib"
target = "/lib"
readonly = true

[[container.filesystem.mounts]]
source = "/usr"
target = "/usr"
readonly = true

[[container.filesystem.mounts]]
source = "/lib64"
target = "/lib64"
readonly = true

[[container.filesystem.mounts]]
source = "/sbin"
target = "/sbin"
readonly = true

[container.cgroup]
enabled = true
# Use cgroup v2 values. Set to numbers or special tokens (e.g., "max") as supported by kernel.
pids_max = "128"
memory_max = "256M"
cpu_max = "100000 50000" # period quota

[container.runtime]
# Max lifetime for a child container process, after which it will be SIGKILLed.
kill_timeout_seconds = 15
