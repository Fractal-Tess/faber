# Faber Configuration File

## Some of the commands can be set via the cli flags.
## Run faber --help to see the available commands and flags.

[api]
host = "0.0.0.0" # The host address for the API server (string)
port = 3000 # The port number for the API server (number)

[api.cors]
enable_cors = false # Enable or disable CORS support (true/false)
cors_allowed_origins = "*" # Allowed origins for CORS requests (string)
cors_allowed_methods = "GET,POST,OPTIONS" # Allowed HTTP methods for CORS (string)
cors_allowed_headers = "*" # Allowed headers for CORS (string)
cors_allow_credentials = false # Allow credentials in CORS requests (true/false)

[api.request]
max_request_size_kb = 10240 # 10MB

[api.auth]
enable = false
api_key = "" # Secret key for authentication, must be set via FABER_AUTH_SECRET_KEY env variable (no fallback for security)

[api.endpoints]
health_endpoint = "/health" # The health check endpoint path (string)
task_execution_endpoint = "/execute" # The endpoint path for executing tasks (string)

[logging]
dir = "/var/log/faber" # The directory to store logs (string)
level = "debug" # The log level (error/warn/info/debug/trace)
rotation = "hourly" # The log rotation (hourly/daily)
file_name_prefix = "faber" # The prefix for the log file name (string)

[executor]
executor_count = 4 # Number of executor threads to process jobs
max_queue_size = 100 # Maximum number of jobs in the queue

[container]
base_dir = "/tmp/faber/containers" # The base directory for all containers
work_dir = "/work" # The working directory for the container 
tmp_dir = "/tmp" # The temporary directory for the container
default_user = 65534 # The default user to run commands as (nobody)
default_group = 65534 # The default group to run commands as (nogroup or nobody)
host_name = "faber" # Container hostname
domain_name = "faber" # Container domain name

[container.security.namespaces]
pid = true      # Enable PID namespace isolation (recommended with mount namespace)
mount = true     # Enable mount namespace isolation (recommended for most use cases)
network = false   # Enable network namespace isolation (isolates network completely)
ipc = true       # Enable IPC namespace isolation (isolates inter-process communication)
uts = true       # Enable UTS namespace isolation (isolates hostname/domain)
user = false     # Enable user namespace isolation (requires careful configuration)
time = false     # Enable time namespace isolation (Linux 5.6+)
cgroup = true    # Enable cgroup namespace isolation (isolates cgroup hierarchy)

[container.resource_limits]
memory_limit_kb = 524288 # 512MB
cpu_time_limit_ms = 10000 # 10 seconds
max_cpu_cores = 1 # 1 core
wall_time_limit_ms = 30000 # 30 seconds
max_processes = 50 # 50 processes
max_fds = 256 # 256 file descriptors
stack_limit_kb = 4096 # 4MB
data_segment_limit_kb = 262144 # 256MB
address_space_limit_kb = 1048576 # 1GB
cpu_rate_limit_percent = 50 # 50%
io_read_limit_kb_s = 10240 # 10MB/s
io_write_limit_kb_s = 10240 # 10MB/s

[container.cgroups]
enabled = true # Enable or disable cgroups support
version = 2 # Not configurable for now
prefix = "faber" # Not configurable for now
enable_cpu_rate_limit = true # Enable or disable CPU rate limiting (true/false)
enable_memory_limit = true # Enable or disable memory limiting (true/false)
enable_process_limit = true # Enable or disable process limiting (true/false)

# Format: `mount_name` = ['host_path', 'container_path', 'permissions']
# permissions: 'ro' for read-only (default), 'rw' for read-write
[container.filesystem.mounts.folders]
# Basic system binaries and libraries (read-only) - only mount if they exist
bin = ["/bin", "/bin", "ro"]
lib = ["/lib", "/lib", "ro"]
lib64 = ["/lib64", "/lib64", "ro"]
usr = ["/usr", "/usr", "ro"]

# Compiler-specific configurations (read-only) - commented out as they may not exist in all environments
# etc_alternatives = ["/etc/alternatives", "/etc/alternatives", "ro"]
# etc_fpc_cfg = ["/etc/fpc.cfg", "/etc/fpc.cfg", "ro"]
# etc_mono = ["/etc/mono", "/etc/mono", "ro"]
# var_lib_ghc = ["/var/lib/ghc", "/var/lib/ghc", "ro"]
# etc_java_17_openjdk = ["/etc/java-17-openjdk", "/etc/java-17-openjdk", "ro"]

# Format 'mount_name' = ['container_path', 'options']
[container.filesystem.mounts.tmpfs]
work_tmpfs = ["/work", "size=128m,nr_inodes=4k"]  # Work directory for user code execution
tmp_tmpfs = ["/tmp", "size=128m,nr_inodes=4k"]

# Format: `mount_name` = ['host_path', 'container_path', 'permissions']
# permissions: 'ro' for read-only (default), 'rw' for read-write
[container.filesystem.mounts.devices]
# Essential device files (read-write for most)
dev_null = ["/dev/null", "/dev/null", "rw"]
dev_random = ["/dev/random", "/dev/random", "rw"]
dev_urandom = ["/dev/urandom", "/dev/urandom", "rw"]
dev_zero = ["/dev/zero", "/dev/zero", "rw"]
dev_full = ["/dev/full", "/dev/full", "rw"]

# Format: `mount_name` = ['host_path', 'container_path', 'permissions']
# permissions: 'ro' for read-only (default), 'rw' for read-write
[container.filesystem.mounts.files]
# Essential configuration files (read-only) - commented out as it may not exist in all environments
# etc_ld_so_cache = ["/etc/ld.so.cache", "/etc/ld.so.cache", "ro"]

[container.security.seccomp]
enabled = false
# Default action for syscalls not explicitly allowed
default_action = "SCMP_ACT_ERRNO"

# Architectures to support
architectures = [
    "SCMP_ARCH_X86_64",
    "SCMP_ARCH_X86", 
    "SCMP_ARCH_AARCH64"
]

[container.security.seccomp.syscalls]

#TODO: Add disallowed syscalls
blocked = []

[container.security.capabilities]
enabled = true
drop_all = true
# Minimal set of capabilities that might be needed for basic operations
# These are only used if drop_all = false
allowed = [
    "CAP_CHOWN",      # Change file ownership
    "CAP_FOWNER",     # Override file permissions
    "CAP_FSETID",     # Set setuid/setgid bits
    "CAP_KILL",       # Send signals to processes
    "CAP_SETGID",     # Set group ID
    "CAP_SETUID",     # Set user ID
    "CAP_SETPCAP",    # Set process capabilities
    "CAP_NET_BIND_SERVICE", # Bind to privileged ports
    "CAP_SYS_CHROOT", # Use chroot
    "CAP_SETFCAP",    # Set file capabilities
]
