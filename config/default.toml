[api]
host = "0.0.0.0"
port = 3000
max_concurrency = 100

[api.auth]
enable = false
api_key = ""

[api.endpoints]
health_endpoint = "/health"
task_execution_endpoint = "/execute"

[logging]
level = "debug"
dir = "/var/log/faber"
rotation = "hourly"
file_name_prefix = "faber"

[container.filesystem]
base_dir = "/tmp/faber/containers"
work_dir = "/faber"
tmp_size = "128M"
workdir_size = "128M"

[[container.filesystem.mounts]]
source = "/bin"
target = "/bin"
readonly = true

[[container.filesystem.mounts]]
source = "/lib"
target = "/lib"
readonly = true

[[container.filesystem.mounts]]
source = "/usr"
target = "/usr"
readonly = true

[[container.filesystem.mounts]]
source = "/lib64"
target = "/lib64"
readonly = true


[container.cgroup]
pids_max = 10
memory_max = "128M"
cpu_max = "100000 50000" # period quota

[container.runtime]
# Max lifetime for a child container process, after which it will be SIGKILLed.
kill_timeout_seconds = 10
