# Seccomp BPF configuration for sandboxed execution
# Based on go-judge's approach using elastic/go-seccomp-bpf

# Default action for syscalls not explicitly allowed
default_action: 'SCMP_ACT_ERRNO'

# Architectures to support
architectures:
  - 'SCMP_ARCH_X86_64'
  - 'SCMP_ARCH_X86'
  - 'SCMP_ARCH_AARCH64'

# Syscalls to allow
syscalls:
  # Basic file operations
  - names: ['read', 'write', 'open', 'close', 'fstat', 'stat', 'lstat', 'lseek']
    action: 'SCMP_ACT_ALLOW'

  # Memory management
  - names:
      [
        'mmap',
        'mprotect',
        'munmap',
        'brk',
        'mremap',
        'msync',
        'mincore',
        'madvise',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Process control
  - names:
      [
        'clone',
        'fork',
        'vfork',
        'execve',
        'exit',
        'exit_group',
        'wait4',
        'waitid',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Signal handling
  - names:
      [
        'rt_sigaction',
        'rt_sigprocmask',
        'rt_sigreturn',
        'sigaltstack',
        'rt_sigsuspend',
      ]
    action: 'SCMP_ACT_ALLOW'

  # I/O operations
  - names: ['ioctl', 'pread64', 'pwrite64', 'readv', 'writev', 'sendfile']
    action: 'SCMP_ACT_ALLOW'

  # File system operations
  - names:
      [
        'access',
        'pipe',
        'dup',
        'dup2',
        'dup3',
        'fcntl',
        'flock',
        'fsync',
        'fdatasync',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Directory operations
  - names: ['getdents', 'getdents64', 'getcwd', 'chdir', 'fchdir']
    action: 'SCMP_ACT_ALLOW'

  # File creation and modification
  - names:
      [
        'creat',
        'link',
        'unlink',
        'symlink',
        'readlink',
        'chmod',
        'fchmod',
        'chown',
        'fchown',
        'lchown',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Time and scheduling
  - names:
      [
        'gettimeofday',
        'nanosleep',
        'clock_gettime',
        'clock_getres',
        'clock_nanosleep',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Process information
  - names:
      ['getpid', 'getppid', 'getuid', 'geteuid', 'getgid', 'getegid', 'gettid']
    action: 'SCMP_ACT_ALLOW'

  # Resource limits
  - names: ['getrlimit', 'setrlimit', 'getrusage', 'prlimit64']
    action: 'SCMP_ACT_ALLOW'

  # System information
  - names: ['uname', 'sysinfo', 'times', 'syslog']
    action: 'SCMP_ACT_ALLOW'

  # Network operations (basic)
  - names:
      [
        'socket',
        'connect',
        'accept',
        'bind',
        'listen',
        'getsockname',
        'getpeername',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Network I/O
  - names:
      [
        'sendto',
        'recvfrom',
        'sendmsg',
        'recvmsg',
        'shutdown',
        'setsockopt',
        'getsockopt',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Process groups and sessions
  - names: ['setpgid', 'getpgid', 'getpgrp', 'setsid', 'getsid']
    action: 'SCMP_ACT_ALLOW'

  # User and group management
  - names:
      [
        'setuid',
        'setgid',
        'setreuid',
        'setregid',
        'setresuid',
        'getresuid',
        'setresgid',
        'getresgid',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Supplementary groups
  - names: ['getgroups', 'setgroups']
    action: 'SCMP_ACT_ALLOW'

  # File system attributes
  - names: ['umask', 'statfs', 'fstatfs']
    action: 'SCMP_ACT_ALLOW'

  # Advanced file operations
  - names: ['truncate', 'ftruncate', 'rename', 'mkdir', 'rmdir']
    action: 'SCMP_ACT_ALLOW'

  # Memory locking
  - names: ['mlock', 'munlock', 'mlockall', 'munlockall']
    action: 'SCMP_ACT_ALLOW'

  # System calls for modern features
  - names:
      [
        'getrandom',
        'memfd_create',
        'eventfd',
        'eventfd2',
        'timerfd_create',
        'timerfd_settime',
        'timerfd_gettime',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Epoll for I/O multiplexing
  - names:
      [
        'epoll_create',
        'epoll_create1',
        'epoll_ctl',
        'epoll_wait',
        'epoll_pwait',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Futex for synchronization
  - names: ['futex', 'set_robust_list', 'get_robust_list']
    action: 'SCMP_ACT_ALLOW'

  # Scheduler operations
  - names:
      [
        'sched_yield',
        'sched_setparam',
        'sched_getparam',
        'sched_setscheduler',
        'sched_getscheduler',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Priority operations
  - names: ['getpriority', 'setpriority', 'ioprio_set', 'ioprio_get']
    action: 'SCMP_ACT_ALLOW'

  # Advanced I/O
  - names: ['io_setup', 'io_destroy', 'io_getevents', 'io_submit', 'io_cancel']
    action: 'SCMP_ACT_ALLOW'

  # File descriptor operations
  - names: ['close_range', 'pidfd_open', 'pidfd_getfd']
    action: 'SCMP_ACT_ALLOW'

  # Modern file operations
  - names:
      [
        'openat',
        'mkdirat',
        'mknodat',
        'fchownat',
        'futimesat',
        'newfstatat',
        'unlinkat',
        'renameat',
      ]
    action: 'SCMP_ACT_ALLOW'

  - names:
      [
        'linkat',
        'symlinkat',
        'readlinkat',
        'fchmodat',
        'faccessat',
        'faccessat2',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Extended attributes
  - names:
      [
        'setxattr',
        'lsetxattr',
        'fsetxattr',
        'getxattr',
        'lgetxattr',
        'fgetxattr',
      ]
    action: 'SCMP_ACT_ALLOW'

  - names:
      [
        'listxattr',
        'llistxattr',
        'flistxattr',
        'removexattr',
        'lremovexattr',
        'fremovexattr',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Process memory operations
  - names:
      [
        'process_vm_readv',
        'process_vm_writev',
        'process_madvise',
        'process_mrelease',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Modern system calls
  - names:
      [
        'statx',
        'copy_file_range',
        'preadv2',
        'pwritev2',
        'pkey_mprotect',
        'pkey_alloc',
        'pkey_free',
      ]
    action: 'SCMP_ACT_ALLOW'

  # Restart syscall (for signal handling)
  - names: ['restart_syscall']
    action: 'SCMP_ACT_ALLOW'
