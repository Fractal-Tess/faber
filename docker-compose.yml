version: '3.8'

services:
  faber:
    build: .
    env_file:
      - .env
    shm_size: 256m
    volumes:
      - ./target/x86_64-unknown-linux-musl/debug:/opt/debug:ro
      - ./logs:/var/log/faber
    privileged: true
    network_mode: 'host'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
