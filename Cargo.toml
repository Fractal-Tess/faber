

[dependencies]
axum = { version = "0.8.4", features = ["macros"] }
tokio = { version = "1.47.1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"
tower-http = { version = "0.6", features = ["trace"] }
utoipa = { version = "5", features = ["axum_extras"] }
utoipa-axum = "0.2"
utoipa-swagger-ui = { version = "9", features = ["axum", "debug-embed"] }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1.0"
uuid = { version = "1.17", features = ["v4", "serde"] }
tempfile = "3.20"
thiserror = "2.0"
clap = { version = "4.5", features = ["derive"] }
tower = "0.5"
hyper = { version = "1.6", features = ["full"] }
# Container and system dependencies
nix = { version = "0.30.1", features = [
    "process",
    "mount",
    "sched",
    "signal",
    "user",
] }
libc = "0.2"
caps = "0.5"
syscallz = "0.17"

[profile.release]
# Enable maximum optimization
opt-level = 3
# Enable link-time optimization
lto = true
# Enable code generation units optimization
codegen-units = 1
# Enable panic abort for smaller binary size
panic = "abort"
# Strip debug symbols for smaller binary size
strip = true
# Enable overflow checks in release mode (optional, remove for maximum performance)
overflow-checks = false
