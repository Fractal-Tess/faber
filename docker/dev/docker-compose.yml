services:
  faber:
    container_name: faber-dev
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile
    volumes:
      - ../../.cargo:/faber/.cargo:ro
      - ../../config:/faber/config:ro
      - ../../src:/faber/src:ro
      - ../../crates:/faber/crates:ro
      - ../../logs:/var/log/faber:rw
      - ../../Cargo.toml:/faber/Cargo.toml:ro
      - cargo-target:/faber/target
    privileged: true
    network_mode: 'host'
    environment:
      - RUST_LOG=debug
      - RUST_BACKTRACE=1
      - CARGO_HOME=/usr/local/cargo

volumes:
  cargo-cache:
  cargo-target:
