services:
  faber:
    container_name: faber-dev
    build:
      context: ../
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ../.cargo:/faber/.cargo:ro
      - ../config:/faber/config:ro
      - ../crates:/faber/crates:ro
      - ../logs:/var/log/faber:rw
      - ../scripts:/faber/scripts:ro
      - ../tests:/faber/tests:ro
      - ../Cargo.toml:/faber/Cargo.toml:ro

      - cargo-target:/faber/target
    privileged: true
    network_mode: 'host'
    environment:
      - RUST_LOG=debug
      - RUST_BACKTRACE=1
      - CARGO_HOME=/usr/local/cargo
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 5
volumes:
  cargo-cache:
  cargo-target:
